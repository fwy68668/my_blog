server:
  port: 8080
  servlet:
    context-path: /  # 保持根路径，方便 Nginx 代理

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Taipei
    username: blog_db
    password: WPikeH2S7sXzMBaa
    driver-class-name: com.mysql.cj.jdbc.Driver
  # ================= Redis 配置 =================
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: "" # 宝塔默认安装的 Redis 通常无密码，如有请填写

  # ================= 接口文档配置 =================
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# ================= MyBatis Plus 配置 =================
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 生产环境建议先开启，方便看SQL纠错
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

# ================= 阿里云 OSS 自定义配置 =================
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com # 👈 确认一下你的 OSS 区域对不对
    bucket-name: javaweb-student-fwy
    # 这里使用占位符，保持灵活性
    access-key-id: ${ALIYUN_OSS_ACCESSKEYID}
    access-key-secret: ${ALIYUN_OSS_ACCESSKEYSECRET}

# ================= 日志配置 =================
logging:
  level:
    com.example.blog.mapper: debug # 方便在宝塔日志里看到数据库执行详情
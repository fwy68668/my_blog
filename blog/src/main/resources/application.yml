server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Taipei
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket-name: javaweb-student-fwy
    # 👇 直接在这里读取环境变量即可，注意保持缩进
    accessKeyId: ${ALIYUN_OSS_ACCESSKEYID}
    accessKeySecret: ${ALIYUN_OSS_ACCESSKEYSECRET}